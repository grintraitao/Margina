<!-- @dsCard group="Colors" viewport="700x160" name="Dark surfaces & status" subtitle="Native dark palette + semantic status colors" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grp { }
  .ttl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-tertiary); margin-bottom: 8px; }
  .row { display: flex; gap: 6px; }
  .chip { flex: 1; }
  .sw { height: 52px; border-radius: var(--radius-sm); }
  .lbl { font-size: 9px; color: var(--text-secondary); margin-top: 4px; text-align: center; font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 8px; color: var(--text-tertiary); text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grp">
      <div class="ttl">Dark surfaces</div>
      <div class="row">
        <div class="chip"><div class="sw" style="background:#0F1A35"></div><div class="lbl">Cosmic</div><div class="hex">#0F1A35</div></div>
        <div class="chip"><div class="sw" style="background:#17234B"></div><div class="lbl">Midnight</div><div class="hex">#17234B</div></div>
        <div class="chip"><div class="sw" style="background:#1c2d56"></div><div class="lbl">Hover</div><div class="hex">#1c2d56</div></div>
        <div class="chip"><div class="sw" style="background:#0a1228"></div><div class="lbl">Abyss</div><div class="hex">#0a1228</div></div>
      </div>
    </div>
    <div class="grp">
      <div class="ttl">Status</div>
      <div class="row">
        <div class="chip"><div class="sw" style="background:var(--color-success)"></div><div class="lbl">Success</div><div class="hex">#00CCC0</div></div>
        <div class="chip"><div class="sw" style="background:var(--color-warning)"></div><div class="lbl">Warning</div><div class="hex">#f5a623</div></div>
        <div class="chip"><div class="sw" style="background:var(--color-danger)"></div><div class="lbl">Danger</div><div class="hex">#ff4070</div></div>
        <div class="chip"><div class="sw" style="background:var(--color-up)"></div><div class="lbl">Up</div><div class="hex">#16c784</div></div>
      </div>
    </div>
  </div>
</body>
</html>
