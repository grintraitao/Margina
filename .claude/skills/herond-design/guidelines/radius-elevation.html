<!-- @dsCard group="Spacing" viewport="700x160" name="Radius & elevation" subtitle="Corner radii and soft shadow system" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); color: var(--text-primary); }
  .wrap { padding: 18px 20px; display: flex; gap: 26px; }
  .grp { display: flex; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .box { width: 52px; height: 52px; background: #fff; border: 1px solid var(--border-default); }
  .sbox { width: 52px; height: 52px; background: #fff; border-radius: var(--radius-md); }
  .n { font-size: 9px; color: var(--text-secondary); font-weight: 600; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grp">
      <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">xs</span><span class="lbl">6</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm</span><span class="lbl">8</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg</span><span class="lbl">14</span></div>
      <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="n">pill</span><span class="lbl">999</span></div>
    </div>
    <div class="grp">
      <div class="col"><div class="sbox" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
      <div class="col"><div class="sbox" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
      <div class="col"><div class="sbox" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
      <div class="col"><div class="sbox" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
    </div>
  </div>
</body>
</html>
