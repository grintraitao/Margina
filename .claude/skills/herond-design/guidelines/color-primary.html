<!-- @dsCard group="Colors" viewport="700x150" name="Primary — Blue ramp" subtitle="Blue Sky #3373F6 and its tints/shades" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: 18px; }
  .row { display: flex; gap: 6px; }
  .chip { flex: 1; }
  .sw { height: 64px; border-radius: var(--radius-sm); }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); margin-top: 5px; text-align: center; }
  .name { font-weight: 700; font-size: 12px; color: var(--text-primary); margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="name">Primary · Blue Sky 500</div>
    <div class="row">
      <div class="chip"><div class="sw" style="background:var(--blue-50)"></div><div class="lbl">50</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-100)"></div><div class="lbl">100</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-200)"></div><div class="lbl">200</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-300)"></div><div class="lbl">300</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-400)"></div><div class="lbl">400</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-500);box-shadow:0 0 0 2px var(--text-primary)"></div><div class="lbl">500</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-600)"></div><div class="lbl">600</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-700)"></div><div class="lbl">700</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-800)"></div><div class="lbl">800</div></div>
      <div class="chip"><div class="sw" style="background:var(--blue-900)"></div><div class="lbl">900</div></div>
    </div>
  </div>
</body>
</html>
