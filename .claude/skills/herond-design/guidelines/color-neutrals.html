<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Gray ramp — surfaces, text, borders" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); }
  .wrap { padding: 18px; }
  .row { display: flex; gap: 6px; }
  .chip { flex: 1; }
  .sw { height: 64px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--text-tertiary); margin-top: 5px; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="chip"><div class="sw" style="background:var(--gray-0)"></div><div class="lbl">0</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-50)"></div><div class="lbl">50</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-100)"></div><div class="lbl">100</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-200)"></div><div class="lbl">200</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-300)"></div><div class="lbl">300</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-400)"></div><div class="lbl">400</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-500)"></div><div class="lbl">500</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-600)"></div><div class="lbl">600</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-700)"></div><div class="lbl">700</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-800)"></div><div class="lbl">800</div></div>
      <div class="chip"><div class="sw" style="background:var(--gray-900)"></div><div class="lbl">900</div></div>
    </div>
  </div>
</body>
</html>
