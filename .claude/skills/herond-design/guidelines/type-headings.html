<!-- @dsCard group="Type" viewport="700x180" name="Display & headings" subtitle="Plus Jakarta Sans — hero through h3" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-page); color: var(--text-primary); }
  .wrap { padding: 20px 22px; display: flex; flex-direction: column; gap: 10px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 96px; flex: none; }
  .d { font-size: var(--text-display); font-weight: 700; letter-spacing: -1px; line-height: 1; }
  .h1 { font-size: var(--text-h1); font-weight: 700; letter-spacing: -0.4px; }
  .h2 { font-size: var(--text-h2); font-weight: 700; }
  .h3 { font-size: var(--text-h3); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="meta">Display 42 / 700</span><span class="d">Defend privacy</span></div>
    <div class="line"><span class="meta">H1 32 / 700</span><span class="h1">Browse decentralized</span></div>
    <div class="line"><span class="meta">H2 24 / 700</span><span class="h2">Your keyless wallet</span></div>
    <div class="line"><span class="meta">H3 20 / 600</span><span class="h3">Portfolio Overview</span></div>
  </div>
</body>
</html>
